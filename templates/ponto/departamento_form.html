{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block title %}{% if object %}Editar{% else %}Novo{% endif %} Setor - Banco de Horas{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-header bg-white py-3 border-0">
                <h3 class="mb-0 fw-bold text-primary">
                    {% if object %}Editar{% else %}Novo{% endif %} Setor
                </h3>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% bootstrap_form form %}
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">Salvar Setor</button>
                        <a href="{% url 'departamento_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
