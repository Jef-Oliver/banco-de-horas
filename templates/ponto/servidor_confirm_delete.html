{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-4 text-center">
            <h1 class="h3 mb-4 text-danger">Excluir Servidor</h1>
            <p class="mb-4">Tem certeza que deseja excluir o servidor <strong>{{ object.nome_completo }}</strong>?</p>
            <p class="text-muted small mb-4">Esta ação não pode ser desfeita e removerá todos os registros de ponto associados.</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'servidor_list' %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger">Sim, Excluir</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
