{% extends 'base.html' %}
{% load django_bootstrap5 %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm p-4">
            <h1 class="h3 mb-4">Registrar Ponto Diário</h1>
            <p class="text-muted small mb-4">Insira os horários de entrada e saída do servidor para cálculo automático do banco de horas.</p>
            <form method="post" novalidate>
                {% csrf_token %}
                {% bootstrap_form form %}
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% url 'relatorio_geral' %}" class="btn btn-outline-secondary">Voltar</a>
                    <button type="submit" class="btn btn-primary d-flex align-items-center">
                        Salvar Registro
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
